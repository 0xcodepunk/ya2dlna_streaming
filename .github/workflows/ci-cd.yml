# CI/CD: проверки на GitHub-hosted раннерах, деплой — на self-hosted
# раннере Raspberry Pi. Деплой срабатывает только на push в main,
# поэтому код из форков на Raspberry никогда не выполняется.
name: CI/CD

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  ci:
    name: Линтеры, типы и тесты
    runs-on: ubuntu-latest
    env:
      # Фиктивные значения настроек: реальные нужны только в рантайме
      APP_YA_MUSIC_TOKEN: ci-dummy-token
      APP_LOCAL_SERVER_HOST: 127.0.0.1
      APP_LOCAL_SERVER_PORT_DLNA: "8080"
      APP_LOCAL_SERVER_PORT_API: "8001"
      APP_RUARK_PIN: "1234"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Установка uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Установка зависимостей
        run: uv sync --frozen

      - name: Проверка форматирования (black)
        run: uv run black --check src tests

      - name: Проверка импортов (isort)
        run: uv run isort --check-only src tests

      - name: Линтер (flake8)
        run: uv run flake8 .

      - name: Проверка типов (mypy)
        run: uv run mypy

      - name: Тесты (pytest)
        run: uv run pytest -q

  deploy:
    name: Деплой на Raspberry Pi
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: [self-hosted, raspberry]
    concurrency:
      group: deploy-raspberry
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Подготовка .env
        run: cp "$HOME/.config/ya2dlna/.env" .env

      - name: Сборка образов
        run: docker compose build

      - name: Перезапуск сервисов
        run: docker compose up -d

      - name: Проверка живости сервисов
        run: |
          # Сервисы слушают адрес из APP_LOCAL_SERVER_HOST, а не localhost
          HOST=$(grep -E '^APP_LOCAL_SERVER_HOST=' .env | cut -d= -f2 | tr -d ' \r')
          PORT_API=$(grep -E '^APP_LOCAL_SERVER_PORT_API=' .env | cut -d= -f2 | tr -d ' \r')
          PORT_DLNA=$(grep -E '^APP_LOCAL_SERVER_PORT_DLNA=' .env | cut -d= -f2 | tr -d ' \r')
          for attempt in $(seq 1 12); do
            if curl -sf -o /dev/null "http://${HOST}:${PORT_API}/docs" \
              && curl -sf -o /dev/null "http://${HOST}:${PORT_DLNA}/docs"; then
              echo "✅ Оба сервиса отвечают на ${HOST}"
              exit 0
            fi
            echo "⏳ Попытка ${attempt}/12 — сервисы ещё не отвечают"
            sleep 5
          done
          echo "❌ Сервисы не поднялись за 60 секунд"
          docker compose ps
          docker compose logs --tail 30
          exit 1

      - name: Чистка неиспользуемых образов
        run: docker image prune -f